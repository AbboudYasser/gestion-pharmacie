# ملف GitHub Actions للتحقق من جودة الكود
# يتم تشغيله على كل push و pull request للتأكد من جودة الكود

name: 🔍 Code Quality Check

# متى يتم تشغيل هذا الـ workflow
on:
  # على كل push
  push:
    branches: [ main, master, develop ]
  
  # على كل pull request
  pull_request:
    branches: [ main, master ]
  
  # تشغيل يدوي
  workflow_dispatch:

# المهام التي سيتم تنفيذها
jobs:
  # فحص الملفات والهيكل
  file-structure-check:
    name: 📁 File Structure Check
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
    
    - name: 🔍 Check Required Files
      run: |
        echo "🔍 Checking project structure..."
        
        # قائمة الملفات المطلوبة
        required_files=(
          "README.md"
          "package.json"
          ".gitignore"
          ".env.example"
          "index.html"
          "frontend/login.html"
          "frontend/dashboard.html"
          "frontend/patients.html"
          "frontend/js/config.js"
          "frontend/js/api.js"
          "frontend/js/utils.js"
          "frontend/js/mockData.js"
          "frontend/css/style.css"
          "backend/main.py"
          "backend/requirements.txt"
        )
        
        missing_files=()
        
        for file in "${required_files[@]}"; do
          if [ ! -f "$file" ]; then
            missing_files+=("$file")
            echo "❌ Missing: $file"
          else
            echo "✅ Found: $file"
          fi
        done
        
        if [ ${#missing_files[@]} -gt 0 ]; then
          echo ""
          echo "❌ Missing ${#missing_files[@]} required files!"
          exit 1
        else
          echo ""
          echo "✅ All required files are present!"
        fi
    
    - name: 📊 Project Statistics
      run: |
        echo "📊 Project Statistics:"
        echo "   • Total files: $(find . -type f | wc -l)"
        echo "   • HTML files: $(find . -name "*.html" | wc -l)"
        echo "   • CSS files: $(find . -name "*.css" | wc -l)"
        echo "   • JS files: $(find . -name "*.js" | wc -l)"
        echo "   • Python files: $(find . -name "*.py" | wc -l)"
        echo "   • Markdown files: $(find . -name "*.md" | wc -l)"

  # فحص HTML
  html-validation:
    name: 🌐 HTML Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
    
    - name: 🔧 Install HTML Validator
      run: |
        sudo apt-get update
        sudo apt-get install -y tidy
    
    - name: ✅ Validate HTML Files
      run: |
        echo "🔍 Validating HTML files..."
        
        html_files=(
          "index.html"
          "frontend/login.html"
          "frontend/dashboard.html"
          "frontend/patients.html"
        )
        
        errors=0
        
        for file in "${html_files[@]}"; do
          if [ -f "$file" ]; then
            echo "Checking $file..."
            if tidy -q -e "$file" 2>/dev/null; then
              echo "✅ $file is valid"
            else
              echo "⚠️ $file has warnings (but may still be functional)"
              # لا نعتبر التحذيرات أخطاء فادحة
            fi
          fi
        done
        
        echo "✅ HTML validation completed!"

  # فحص CSS
  css-validation:
    name: 🎨 CSS Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
    
    - name: 🔍 Check CSS Syntax
      run: |
        echo "🔍 Checking CSS files..."
        
        css_files=$(find frontend/css -name "*.css" 2>/dev/null || echo "")
        
        if [ -z "$css_files" ]; then
          echo "⚠️ No CSS files found"
          exit 0
        fi
        
        for file in $css_files; do
          echo "Checking $file..."
          
          # فحص أساسي للأقواس المتوازنة
          if [ $(grep -o '{' "$file" | wc -l) -eq $(grep -o '}' "$file" | wc -l) ]; then
            echo "✅ $file has balanced braces"
          else
            echo "❌ $file has unbalanced braces"
            exit 1
          fi
        done
        
        echo "✅ CSS validation completed!"

  # فحص JavaScript
  javascript-validation:
    name: 🟨 JavaScript Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
    
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: 🔍 Check JavaScript Syntax
      run: |
        echo "🔍 Checking JavaScript files..."
        
        js_files=$(find frontend/js -name "*.js" 2>/dev/null || echo "")
        
        if [ -z "$js_files" ]; then
          echo "⚠️ No JavaScript files found"
          exit 0
        fi
        
        errors=0
        
        for file in $js_files; do
          echo "Checking $file..."
          
          # فحص أساسي للصيغة باستخدام node
          if node -c "$file" 2>/dev/null; then
            echo "✅ $file syntax is valid"
          else
            echo "❌ $file has syntax errors"
            errors=$((errors + 1))
          fi
        done
        
        if [ $errors -gt 0 ]; then
          echo "❌ Found $errors JavaScript files with syntax errors"
          exit 1
        else
          echo "✅ All JavaScript files are valid!"
        fi

  # فحص Python
  python-validation:
    name: 🐍 Python Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: 📦 Install Python Dependencies
      run: |
        if [ -f backend/requirements.txt ]; then
          pip install -r backend/requirements.txt
        fi
        pip install flake8 black
    
    - name: 🔍 Check Python Syntax
      run: |
        echo "🔍 Checking Python files..."
        
        python_files=$(find backend -name "*.py" 2>/dev/null || echo "")
        
        if [ -z "$python_files" ]; then
          echo "⚠️ No Python files found"
          exit 0
        fi
        
        # فحص الصيغة
        for file in $python_files; do
          echo "Checking syntax of $file..."
          if python -m py_compile "$file"; then
            echo "✅ $file syntax is valid"
          else
            echo "❌ $file has syntax errors"
            exit 1
          fi
        done
        
        echo "✅ All Python files have valid syntax!"
    
    - name: 🎨 Check Python Code Style
      run: |
        echo "🎨 Checking Python code style..."
        
        python_files=$(find backend -name "*.py" 2>/dev/null || echo "")
        
        if [ -z "$python_files" ]; then
          echo "⚠️ No Python files found"
          exit 0
        fi
        
        # فحص نمط الكود (مع تساهل في القواعد)
        flake8 backend/ --max-line-length=100 --ignore=E203,W503 || echo "⚠️ Style warnings found (not blocking)"
        
        echo "✅ Python style check completed!"

  # فحص الأمان الأساسي
  security-check:
    name: 🔒 Security Check
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
    
    - name: 🔍 Check for Sensitive Files
      run: |
        echo "🔍 Checking for sensitive files..."
        
        # قائمة الملفات الحساسة التي يجب عدم وجودها
        sensitive_patterns=(
          "*.env"
          "*.key"
          "*.pem"
          "*.p12"
          "*.pfx"
          "*password*"
          "*secret*"
          "serviceAccountKey.json"
          "firebase-adminsdk-*.json"
        )
        
        found_sensitive=false
        
        for pattern in "${sensitive_patterns[@]}"; do
          files=$(find . -name "$pattern" -not -path "./.git/*" 2>/dev/null || echo "")
          if [ ! -z "$files" ]; then
            echo "⚠️ Found potentially sensitive files:"
            echo "$files"
            found_sensitive=true
          fi
        done
        
        if [ "$found_sensitive" = true ]; then
          echo ""
          echo "⚠️ Please ensure sensitive files are in .gitignore"
          echo "✅ Check completed with warnings"
        else
          echo "✅ No sensitive files found in repository"
        fi
    
    - name: 🔍 Check for Hardcoded Secrets
      run: |
        echo "🔍 Checking for hardcoded secrets..."
        
        # البحث عن أنماط المفاتيح السرية المحتملة
        secret_patterns=(
          "password\s*=\s*['\"][^'\"]{8,}"
          "secret\s*=\s*['\"][^'\"]{16,}"
          "api_key\s*=\s*['\"][^'\"]{16,}"
          "token\s*=\s*['\"][^'\"]{20,}"
        )
        
        found_secrets=false
        
        for pattern in "${secret_patterns[@]}"; do
          if grep -r -i -E "$pattern" . --exclude-dir=.git --exclude="*.md" 2>/dev/null; then
            found_secrets=true
          fi
        done
        
        if [ "$found_secrets" = true ]; then
          echo "⚠️ Potential hardcoded secrets found. Please review and use environment variables."
        else
          echo "✅ No obvious hardcoded secrets found"
        fi

  # فحص الروابط
  link-check:
    name: 🔗 Link Check
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
    
    - name: 🔍 Check Internal Links
      run: |
        echo "🔍 Checking internal links in HTML files..."
        
        html_files=$(find . -name "*.html" 2>/dev/null || echo "")
        
        if [ -z "$html_files" ]; then
          echo "⚠️ No HTML files found"
          exit 0
        fi
        
        broken_links=0
        
        for html_file in $html_files; do
          echo "Checking links in $html_file..."
          
          # استخراج الروابط المحلية
          local_links=$(grep -o 'href="[^"]*"' "$html_file" | grep -v 'http' | sed 's/href="//g' | sed 's/"//g' || echo "")
          
          for link in $local_links; do
            # تجاهل الروابط التي تبدأ بـ # (anchors)
            if [[ "$link" == \#* ]]; then
              continue
            fi
            
            # تحويل الرابط النسبي إلى مسار مطلق
            if [[ "$link" == /* ]]; then
              full_path=".$link"
            else
              dir=$(dirname "$html_file")
              full_path="$dir/$link"
            fi
            
            if [ ! -f "$full_path" ]; then
              echo "❌ Broken link in $html_file: $link"
              broken_links=$((broken_links + 1))
            fi
          done
        done
        
        if [ $broken_links -gt 0 ]; then
          echo "⚠️ Found $broken_links broken internal links"
        else
          echo "✅ All internal links are valid!"
        fi

  # تقرير النتائج النهائي
  quality-report:
    name: 📋 Quality Report
    needs: [file-structure-check, html-validation, css-validation, javascript-validation, python-validation, security-check, link-check]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: 📋 Generate Quality Report
      run: |
        echo "📋 Code Quality Report"
        echo "====================="
        echo ""
        echo "🔍 Checks Performed:"
        echo "   • File Structure: ${{ needs.file-structure-check.result }}"
        echo "   • HTML Validation: ${{ needs.html-validation.result }}"
        echo "   • CSS Validation: ${{ needs.css-validation.result }}"
        echo "   • JavaScript Validation: ${{ needs.javascript-validation.result }}"
        echo "   • Python Validation: ${{ needs.python-validation.result }}"
        echo "   • Security Check: ${{ needs.security-check.result }}"
        echo "   • Link Check: ${{ needs.link-check.result }}"
        echo ""
        
        # حساب النتيجة الإجمالية
        if [[ "${{ needs.file-structure-check.result }}" == "success" && 
              "${{ needs.html-validation.result }}" == "success" && 
              "${{ needs.css-validation.result }}" == "success" && 
              "${{ needs.javascript-validation.result }}" == "success" && 
              "${{ needs.python-validation.result }}" == "success" ]]; then
          echo "🎉 Overall Quality: EXCELLENT"
          echo "✅ All critical checks passed!"
        else
          echo "⚠️ Overall Quality: NEEDS ATTENTION"
          echo "❌ Some checks failed or have warnings"
        fi
        
        echo ""
        echo "📅 Report generated at: $(date)"
        echo "🔗 Repository: ${{ github.repository }}"
        echo "🌿 Branch: ${{ github.ref_name }}"
